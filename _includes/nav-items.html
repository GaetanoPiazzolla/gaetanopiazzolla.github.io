<div class="nav-items">
  {%- for path in include.paths -%}
  {%- assign hyperpage = site.pages | where: "path", path | first -%}
  {%- if hyperpage.title and hyperpage.exclude_nav != true %}
  <a class="nav-item" href="{{ hyperpage.url | relative_url }}">{{ hyperpage.title | escape }}</a>
  {%- endif -%}
  {%- endfor %}

  <!-- PayPal Donation Button -->
  <form action="https://www.paypal.com/donate" method="post" target="_top" style="display: inline-block; margin: 0;">
    <input type="hidden" name="business" value="PECDH38VFPUDC" />
    <input type="hidden" name="no_recurring" value="0" />
    <input type="hidden" name="item_name" value="Your support means a lot to me. Thank you for appreciating my work!" />
    <input type="hidden" name="currency_code" value="EUR" />
    <button type="submit" class="nav-item paypal-nav-btn">
      ☕ Donate
    </button>
  </form>
</div>
